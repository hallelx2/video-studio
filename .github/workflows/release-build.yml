name: release-build

on:
  release:
    types: [published]
  # release-please publishes via GITHUB_TOKEN, and workflows fired by
  # GITHUB_TOKEN don't cascade-trigger other workflows. workflow_dispatch
  # gives us a manual handle so we can attach binaries to a release that
  # release-please just made (or rebuild a release on demand).
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach artifacts to (e.g. v0.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target_flag: --win
            artifact_glob: |
              dist/installers/*.exe
              dist/installers/*.msi
              dist/installers/*.zip
              dist/installers/*.blockmap
              dist/installers/latest*.yml
          - os: macos-latest
            target_flag: --mac
            artifact_glob: |
              dist/installers/*.dmg
              dist/installers/*.zip
              dist/installers/*.blockmap
              dist/installers/latest-mac.yml
          - os: ubuntu-latest
            target_flag: --linux
            artifact_glob: |
              dist/installers/*.AppImage
              dist/installers/*.deb
              dist/installers/*.rpm
              dist/installers/*.snap
              dist/installers/latest-linux.yml
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: install ffmpeg (linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: install ffmpeg (macos)
        if: matrix.os == 'macos-latest'
        run: brew install ffmpeg

      - name: install ffmpeg (windows)
        if: matrix.os == 'windows-latest'
        run: choco install ffmpeg -y --no-progress

      - run: pnpm install --frozen-lockfile

      - name: build
        # Run the renderer + electron tsc + agent build first so
        # electron-builder finds compiled output to package.
        run: pnpm build

      - name: package (electron-builder)
        # Direct invocation, not via the npm script, so --publish=never
        # actually reaches electron-builder. Without this it sees CI=true
        # ("artifacts will be published if draft release exists") and
        # tries to upload itself, which fails against the existing
        # non-draft release that release-please made.
        # CSC_IDENTITY_AUTO_DISCOVERY=false disables ad-hoc macOS
        # signing attempts since we don't ship signing certs in CI.
        run: pnpm exec electron-builder ${{ matrix.target_flag }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: ${{ matrix.artifact_glob }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
